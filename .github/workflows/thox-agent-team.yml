name: THOX Agent Team

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled, closed]
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read
  checks: read
  statuses: read

concurrency:
  group: thox-agent-team-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  review:
    name: THOX issue and PR policy validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate agent-team policy
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/thox-agent-team.md
          echo "Repository review policy present for ${{ github.repository }}"
      - name: Validate documented safety gates
        shell: bash
        run: |
          set -euo pipefail
          grep -q "Required checks" docs/thox-agent-team.md
          grep -q "Branch protection" docs/thox-agent-team.md
          grep -q "Branch pruning policy" docs/thox-agent-team.md
          echo "Safe merge and pruning policy validated."
